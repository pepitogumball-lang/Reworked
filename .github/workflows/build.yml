name: Build Geode Mod

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.config.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Win64
          - target: MacIntel
          - target: MacArm
          - target: Android64
          - target: Android32

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v5.6.1
          target: ${{ matrix.config.target }}
          build-config: RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.target }}-build
          path: build/*.geode
          if-no-files-found: warn

  package:
    name: Package .geode files
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: out/

      - name: Upload all .geode files
        uses: actions/upload-artifact@v4
        with:
          name: Xd-rework-all
          path: out/**/*.geode
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged .geode
        uses: actions/download-artifact@v4
        with:
          name: Xd-rework-all
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: changelog.md
          files: release/*.geode
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
